name: Import races

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

concurrency:
  group: import-races
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Import RCK races
        run: node import-rck.js
        env:
          RCK_GEOCODE: "0"

      - name: Commit RCK data to main and dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RCK_FILES="rck-races.json rck-unmatched-venues.json rck-venue-candidates.json"

          git add $RCK_FILES
          if git diff --staged --quiet; then
            echo "Keine RCK-Änderungen."
          else
            git commit -m "Update RCK race data"
            git push origin main

            git checkout -B dev origin/dev
            git checkout main -- $RCK_FILES
            git commit -m "Update RCK race data"
            git push origin dev

            git checkout main
          fi

      - name: Wait for MyRCM availability
        run: |
          for i in $(seq 1 10); do
            echo "Versuch $i/10 — $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            if curl --fail --silent --location \
              --connect-timeout 15 --max-time 30 \
              https://www.myrcm.ch/ > /dev/null; then
              echo "MyRCM erreichbar."
              exit 0
            fi
            if [ "$i" -lt 10 ]; then
              echo "Nicht erreichbar — warte 20 Minuten..."
              sleep 1200
            fi
          done
          echo "MyRCM nach 10 Versuchen nicht erreichbar — Import abgebrochen."
          exit 1

      - name: Import MyRCM races
        run: npm run import

      - name: Commit MyRCM data to main and dev
        run: |
          MYRCM_FILES="races.json hosts.json venues.json venue-unmatched.json"

          git add $MYRCM_FILES
          if git diff --staged --quiet; then
            echo "Keine MyRCM-Änderungen."
          else
            git commit -m "Update MyRCM race data"
            git push origin main

            git checkout -B dev origin/dev
            git checkout main -- $MYRCM_FILES
            git commit -m "Update MyRCM race data"
            git push origin dev

            git checkout main
          fi

      - name: Send race notifications
        if: success()
        run: |
          echo "Sende Renn-Benachrichtigungen — $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          HTTP_CODE=$(curl --silent \
            --output /tmp/notif-body.txt \
            --write-out "%{http_code}" \
            --request POST \
            --url "https://ncsqbncxctofkmabmwku.supabase.co/functions/v1/send-race-notifications" \
            --header "Authorization: Bearer sb_publishable_Y9b0eW34GzqNfG3u8JZmiA_EI7fSc6P" \
            --header "Content-Type: application/json")
          echo "HTTP $HTTP_CODE"
          cat /tmp/notif-body.txt
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Benachrichtigung fehlgeschlagen (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Benachrichtigungen erfolgreich versendet."
