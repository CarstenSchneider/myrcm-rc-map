name: Import races

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

concurrency:
  group: import-races
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Import RCK races
        run: node import-rck.js
        env:
          RCK_GEOCODE: "0"

      - name: Commit RCK data to main and dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RCK_FILES="rck-races.json rck-unmatched-venues.json rck-venue-candidates.json"

          git add $RCK_FILES
          if git diff --staged --quiet; then
            echo "main: keine RCK-Änderungen"
          else
            git commit -m "Update RCK race data"
            git push origin main
          fi

          git checkout -B dev origin/dev
          git checkout main -- $RCK_FILES
          if git diff --staged --quiet; then
            echo "dev: keine RCK-Änderungen"
          else
            git commit -m "Update RCK race data"
            git push origin dev
          fi

          git checkout main

      - name: Wait for MyRCM availability
        run: |
          for i in 1 2 3 4 5; do
            echo "Versuch $i..."
            if curl --fail --silent --location \
              --connect-timeout 10 --max-time 25 \
              https://www.myrcm.ch/ > /dev/null; then
              echo "MyRCM erreichbar"
              exit 0
            fi
            echo "Nicht erreichbar, warte 5 Minuten..."
            sleep 300
          done
          echo "MyRCM nach 5 Versuchen nicht erreichbar, Import übersprungen"
          exit 1

      - name: Import MyRCM races
        run: npm run import

      - name: Commit MyRCM data to main and dev
        run: |
          MYRCM_FILES="races.json hosts.json venues.json venue-unmatched.json"

          git add $MYRCM_FILES
          if git diff --staged --quiet; then
            echo "main: keine MyRCM-Änderungen"
          else
            git commit -m "Update MyRCM race data"
            git push origin main
          fi

          git checkout -B dev origin/dev
          git checkout main -- $MYRCM_FILES
          if git diff --staged --quiet; then
            echo "dev: keine MyRCM-Änderungen"
          else
            git commit -m "Update MyRCM race data"
            git push origin dev
          fi
