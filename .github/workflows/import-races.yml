name: Import races

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

concurrency:
  group: import-races
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check MyRCM availability
        run: |
          curl --fail --silent --show-error --location \
            --connect-timeout 10 \
            --max-time 25 \
            --retry 2 \
            --retry-delay 10 \
            --retry-all-errors \
            https://www.myrcm.ch/ > /dev/null

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Import MyRCM races
        run: npm run import

      - name: Import RCK races
        run: node import-rck.js
        env:
          RCK_GEOCODE: "0"

      - name: Commit data to main and dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATA_FILES="races.json hosts.json venues.json venue-unmatched.json rck-races.json rck-unmatched-venues.json rck-venue-candidates.json"

          git add $DATA_FILES
          if git diff --staged --quiet; then
            echo "main: keine Änderungen"
          else
            git commit -m "Update race data from MyRCM + RCK"
            git push origin main
          fi

          git checkout -B dev origin/dev
          git checkout main -- $DATA_FILES
          if git diff --staged --quiet; then
            echo "dev: keine Änderungen"
          else
            git commit -m "Update race data from MyRCM + RCK"
            git push origin dev
          fi
