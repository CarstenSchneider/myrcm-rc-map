name: Import MyRCM races

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: import-myrcm
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check MyRCM availability
        run: |
          curl --fail --silent --show-error --location \
            --connect-timeout 10 \
            --max-time 25 \
            --retry 2 \
            --retry-delay 10 \
            --retry-all-errors \
            https://www.myrcm.ch/ > /dev/null

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Import races from MyRCM
        run: npm run import

      - name: Commit updated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update races from MyRCM
          file_pattern: |
            races.json
            hosts.json
            venues.json
            venue-unmatched.json
            myrcm-hosts-dach.json
