name: Deploy MAIN site to Hetzner

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-site-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare site files
        run: |
          mkdir -p .deploy-site
          cp index.html .deploy-site/
          cp app.js .deploy-site/
          cp style.css .deploy-site/
          cp impressum-datenschutz.html .deploy-site/
          cp races.json .deploy-site/
          cp rck-races.json .deploy-site/
          cp venues.json .deploy-site/
          cp hosts.json .deploy-site/
          cp series.json .deploy-site/
          cp myrcm-hosts-dach.json .deploy-site/ 2>/dev/null || cp myrcm-hosts-germany.json .deploy-site/ 2>/dev/null || true
          cp rck-venue-candidates.json .deploy-site/
          cp -R favicon_io .deploy-site/

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload MAIN site files
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PASSWORD: ${{ secrets.HETZNER_PASSWORD }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          lftp -u "$HETZNER_USER","$HETZNER_PASSWORD" -p "$HETZNER_PORT" "sftp://$HETZNER_HOST" <<EOF
          set sftp:auto-confirm yes
          mirror -R .deploy-site . --verbose --transfer-all
          bye
          EOF
