name: Trigger Render Import

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'  # 16:00 MESZ / 15:00 MEZ

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Cron Job
        run: |
          HTTP_CODE=$(curl --silent \
            --output /tmp/render-response.txt \
            --write-out "%{http_code}" \
            --request POST \
            --url "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/jobs" \
            --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --header "Content-Type: application/json" \
            --data '{"startCommand":"bash scripts/render-import.sh"}')
          cat /tmp/render-response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Render trigger fehlgeschlagen (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Render Import getriggert (HTTP $HTTP_CODE)"
