name: Discover MyRCM Hosts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Discover German MyRCM hosts
        run: npm run discover-hosts

      - name: Commit host list
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Discover German MyRCM hosts
          file_pattern: myrcm-hosts-germany.json
