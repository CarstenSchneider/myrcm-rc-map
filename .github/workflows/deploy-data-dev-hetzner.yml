name: Deploy Data DEV to Hetzner

on:
  workflow_dispatch:

jobs:
  deploy-data-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Prepare data files
        run: |
          mkdir -p .deploy-data
          cp venues.json .deploy-data/
          cp races.json .deploy-data/
          cp rck-races.json .deploy-data/
          cp rck-venue-candidates.json .deploy-data/
          cp rck-unmatched-venues.json .deploy-data/
          cp myrcm-hosts-dach.json .deploy-data/ 2>/dev/null || cp myrcm-hosts-germany.json .deploy-data/ 2>/dev/null || true
          cp hosts.json .deploy-data/
          cp series.json .deploy-data/
          cp dmc-races.json .deploy-data/ 2>/dev/null || true
          cp dmc-venues.json .deploy-data/ 2>/dev/null || true
          cp rcco-races.json .deploy-data/ 2>/dev/null || true
          cp rcco-venues.json .deploy-data/ 2>/dev/null || true

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload data files to DEV
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PASSWORD: ${{ secrets.HETZNER_PASSWORD }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          lftp -u "$HETZNER_USER","$HETZNER_PASSWORD" -p "$HETZNER_PORT" "sftp://$HETZNER_HOST" <<EOF
          set sftp:auto-confirm yes
          mirror -R .deploy-data ./rcracemap-dev --verbose --transfer-all
          bye
          EOF
