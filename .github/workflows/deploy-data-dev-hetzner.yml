name: Deploy Data DEV to Hetzner

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (DEV branch)
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Prepare data files
        run: |
          mkdir -p .deploy-data
          cp venues.json .deploy-data/
          cp races.json .deploy-data/
          cp rck-races.json .deploy-data/
          cp rck-venue-candidates.json .deploy-data/
          cp rck-unmatched-venues.json .deploy-data/
          cp myrcm-hosts-germany.json .deploy-data/
          cp hosts.json .deploy-data/

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Upload data files to DEV
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASSWORD" "$FTP_HOST" <<EOF
          set ssl:verify-certificate no
          mirror -R .deploy-data ./rcracemap-dev --verbose
          bye
          EOF
