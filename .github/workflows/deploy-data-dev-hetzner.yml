name: Deploy DEV data to Hetzner

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy-data-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare data files
        run: |
          mkdir -p .deploy-data
          cp venues.json .deploy-data/
          cp races.json .deploy-data/
          cp rck-races.json .deploy-data/
          cp rck-venue-candidates.json .deploy-data/
          cp rck-unmatched-venues.json .deploy-data/
          cp myrcm-hosts-germany.json .deploy-data/

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload DEV data files
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PASSWORD: ${{ secrets.HETZNER_PASSWORD }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          lftp -u "$HETZNER_USER","$HETZNER_PASSWORD" -p "$HETZNER_PORT" "sftp://$HETZNER_HOST" -e "
          set sftp:auto-confirm yes
          mkdir -p rcracemap-dev
          put -O ./rcracemap-dev .deploy-data/venues.json
          put -O ./rcracemap-dev .deploy-data/races.json
          put -O ./rcracemap-dev .deploy-data/rck-races.json
          put -O ./rcracemap-dev .deploy-data/rck-venue-candidates.json
          put -O ./rcracemap-dev .deploy-data/rck-unmatched-venues.json
          put -O ./rcracemap-dev .deploy-data/myrcm-hosts-germany.json
          bye
          "
