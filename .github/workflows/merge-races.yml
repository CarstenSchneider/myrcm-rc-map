name: Merge Races

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Merge race data
        run: node merge-races.js

      - name: Commit merged file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update combined race data
          file_pattern: combined-races.json
