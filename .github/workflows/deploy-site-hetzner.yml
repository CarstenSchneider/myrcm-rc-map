name: Deploy site to Hetzner

on:
  workflow_dispatch:

jobs:
  deploy-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare site files
        run: |
          mkdir -p .deploy-site
          cp index.html .deploy-site/
          cp app.js .deploy-site/
          cp style.css .deploy-site/
          cp series.json .deploy-site/
          cp impressum-datenschutz.html .deploy-site/

      - name: Verify local app.js version
        run: |
          echo "Checking local app.js..."
          grep -n 'appendGroup("Überregional"' .deploy-site/app.js || true

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload site files
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PASSWORD: ${{ secrets.HETZNER_PASSWORD }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          lftp -u "$HETZNER_USER","$HETZNER_PASSWORD" -p "$HETZNER_PORT" "sftp://$HETZNER_HOST" <<EOF
          set sftp:auto-confirm yes
          mirror -R .deploy-site ./ --verbose
          bye
          EOF

      - name: Show remote directory
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PASSWORD: ${{ secrets.HETZNER_PASSWORD }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          echo "Remote directory information:"
          lftp -u "$HETZNER_USER","$HETZNER_PASSWORD" -p "$HETZNER_PORT" "sftp://$HETZNER_HOST" <<EOF
          set sftp:auto-confirm yes
          pwd
          cls -l
          bye
          EOF
