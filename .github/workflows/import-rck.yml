name: Import RCK races DEV

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"

permissions:
  contents: write

jobs:
  import-rck-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run RCK importer
        run: node import-rck.js
        env:
          RCK_GEOCODE: "0"

      - name: Commit generated RCK files to dev
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update RCK race data DEV
          branch: dev
          file_pattern: |
            rck-races.json
            rck-unmatched-venues.json
            rck-venue-candidates.json
