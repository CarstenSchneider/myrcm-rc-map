name: Import RCCO races DEV

# DEAKTIVIERT — rccar-online.de Nutzungsbedingungen verbieten Webscraping.
# Reaktivieren sobald eine offizielle Genehmigung von rccar-online.de vorliegt.
# Kontaktaufnahme erfolgt am 2026-06-28.

on:
  workflow_dispatch:

jobs:
  import-rcco-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Abgebrochen — kein Scraping ohne Genehmigung
        run: |
          echo "RCCO-Import ist deaktiviert."
          echo "rccar-online.de Nutzungsbedingungen verbieten automatisiertes Extrahieren von Daten."
          echo "Bitte erst Genehmigung einholen."
          exit 0
