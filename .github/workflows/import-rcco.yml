name: Import RCCO races DEV

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-rcco-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run RCCO importer
        run: node import-rcco.js

      - name: Commit generated RCCO files to dev
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add rcco-races.json rcco-venues.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git pull --rebase --autostash origin dev
            git commit -m "Update RCCO race data DEV"
            git push origin dev
          fi
