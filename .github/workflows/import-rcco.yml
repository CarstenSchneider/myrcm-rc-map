name: Import RCCO races DEV

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-rcco-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run RCCO importer
        run: node import-rcco.js

      - name: Commit generated RCCO files to dev
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update RCCO race data DEV
          branch: dev
          file_pattern: |
            rcco-races.json
            rcco-venues.json
