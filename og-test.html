<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>og:image Test</title>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; margin: 0; padding: 16px; }
  h1 { font-size: 18px; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .card { background: #222; border-radius: 8px; overflow: hidden; }
  .card img { width: 100%; height: 130px; object-fit: cover; display: block; background: #333; }
  .card .label { padding: 8px 10px; font-size: 12px; line-height: 1.4; color: #ccc; }
  .card .label a { color: #88aaff; text-decoration: none; font-size: 11px; }
  .broken { opacity: 0.4; }
  #count { color: #888; font-size: 14px; margin-bottom: 12px; }
</style>
</head>
<body>
<h1>Club og:images</h1>
<div id="count">Lade…</div>
<div class="grid" id="grid"></div>
<script>
fetch("hosts.json")
  .then(r => r.json())
  .then(hosts => {
    const withOg = hosts.filter(h => h.ogImage);
    document.getElementById("count").textContent = `${withOg.length} Clubs mit og:image (von ${hosts.length} gesamt)`;
    const grid = document.getElementById("grid");
    for (const h of withOg) {
      const card = document.createElement("div");
      card.className = "card";
      const img = document.createElement("img");
      img.src = h.ogImage;
      img.alt = h.name;
      img.onerror = () => { img.style.display = "none"; card.classList.add("broken"); };
      const label = document.createElement("div");
      label.className = "label";
      label.innerHTML = `<strong>${h.name}</strong><br><a href="${h.website || '#'}" target="_blank">${(h.website||'').replace(/^https?:\/\//, '')}</a>`;
      card.appendChild(img);
      card.appendChild(label);
      grid.appendChild(card);
    }
  });
</script>
</body>
</html>
