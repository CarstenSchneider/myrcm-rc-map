<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RC Race Map Beta</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
  <link rel="manifest" href="/favicon_io/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* v1.6.5 target topbar polish */
    .layout-prototype .filters-panel {
      top: 16px;
      left: 20px;
      right: 20px;
      width: auto;
      max-width: none;
    }

    .layout-prototype .topbar {
      --topbar-main-offset: 64px;
      min-height: 60px;
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .layout-prototype .topbar::before {
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 8px 22px rgba(31, 29, 26, 0.07);
    }

    .layout-prototype .topbar .app-menu-button {
      flex: 0 0 44px;
      width: 44px;
      height: 44px;
      font-size: 0;
      font-weight: 400;
      box-shadow: 0 7px 18px rgba(31, 29, 26, 0.08);
    }

    .layout-prototype .topbar .app-menu-button span {
      position: relative;
      display: block;
      width: 21px;
      height: 15px;
    }

    .layout-prototype .topbar .app-menu-button span::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 21px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      box-shadow:
        0 6.5px 0 currentColor,
        0 13px 0 currentColor;
    }

    .layout-prototype .topbar-range,
    .layout-prototype .topbar-series,
    .layout-prototype .topbar-favorites,
    .layout-prototype .topbar-search {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .layout-prototype .topbar-range {
      order: 2;
      flex: 0 0 auto;
    }

    .layout-prototype .topbar-series {
      order: 3;
      flex: 0 1 clamp(260px, 20vw, 380px);
    }

    .layout-prototype .topbar-spacer {
      order: 4;
      flex: 1 1 auto;
      min-width: 24px;
    }

    .layout-prototype .topbar-favorites {
      order: 5;
      flex: 0 0 auto;
    }

    .layout-prototype .topbar-registration {
      order: 6;
      flex: 0 0 auto;
    }

    .layout-prototype .topbar-search,
    .layout-prototype .topbar .filter-field-search {
      order: 7 !important;
    }

    .layout-prototype .topbar-search {
      position: relative;
      flex: 0 0 clamp(280px, 17vw, 320px);
      max-width: 320px;
    }

    .layout-prototype .topbar-filter-label {
      display: none !important;
    }

    .layout-prototype .topbar .label-short {
      display: none !important;
    }

    .layout-prototype .topbar .label-full {
      display: inline !important;
    }

    .layout-prototype .topbar .segmented,
    .layout-prototype .topbar .topbar-toggle,
    .layout-prototype .topbar .race-visibility-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0;
      flex: 0 0 auto;
      width: auto;
      padding: 4px;
      border: 0;
      border-radius: 999px;
      background: rgba(245, 245, 245, 0.96);
    }

    .layout-prototype .topbar .segmented button,
    .layout-prototype .topbar .topbar-toggle button,
    .layout-prototype .topbar .race-visibility-toggle button {
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 36px;
      min-height: 36px;
      min-width: 82px;
      padding: 0 18px;
      border: 0 !important;
      border-radius: 999px;
      background: transparent !important;
      color: var(--accent) !important;
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      line-height: 1;
      white-space: nowrap;
      box-shadow: none;
      cursor: pointer;
    }

    .layout-prototype .topbar .segmented button {
      min-width: 112px;
    }

    .layout-prototype .topbar .topbar-favorites button[data-favorite-filter="favorites"] {
      min-width: 132px;
    }

    .layout-prototype .topbar .segmented button.active,
    .layout-prototype .topbar .topbar-registration button.active,
    .layout-prototype .topbar .topbar-favorites button.active {
      background: var(--accent) !important;
      color: #fff !important;
    }

    .layout-prototype .topbar .topbar-favorites button.active[data-favorite-filter="favorites"] {
      background: var(--favorite) !important;
    }

    .layout-prototype .topbar .topbar-toggle button:not(.active),
    .layout-prototype .topbar .race-visibility-toggle button:not(.active) {
      border-color: transparent !important;
      background: transparent !important;
      color: var(--accent) !important;
    }

    .layout-prototype .topbar select,
    .layout-prototype .topbar input {
      width: 100%;
      height: 36px;
      min-height: 36px;
      border: 0;
      border-radius: 999px;
      background-color: rgba(245, 245, 245, 0.96);
      color: var(--accent);
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      box-shadow: none;
    }

    .layout-prototype .topbar select {
      padding: 8px 42px 8px 18px;
    }

    .layout-prototype .topbar input {
      padding: 8px 52px 8px 22px;
    }

    .layout-prototype .topbar .favorite-toggle-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--favorite);
      font-size: 11px;
      line-height: 1;
    }

    .layout-prototype .topbar .race-visibility-toggle .race-document-dot,
    .layout-prototype .topbar .race-visibility-toggle button.active .race-document-dot {
      width: 11px !important;
      height: 11px !important;
      background: var(--status-open) !important;
    }

    .layout-prototype .topbar .filter-toggle-button {
      display: none !important;
    }

    @media (max-width: 1080px) {
      .layout-prototype .topbar .label-full {
        display: none !important;
      }

      .layout-prototype .topbar .label-short {
        display: inline !important;
      }
    }

    @media (max-width: 860px) {
      .layout-prototype .filters-panel {
        top: calc(10px + env(safe-area-inset-top));
        left: 10px;
        right: 10px;
        width: auto;
        max-width: none;
      }

      .layout-prototype .topbar {
        --topbar-main-offset: 0;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 8px;
        min-height: 0;
        padding: 8px;
        border-radius: 18px;
      }

      .layout-prototype .topbar .app-menu-button {
        flex-basis: 36px;
        width: 36px;
        height: 36px;
      }

      .layout-prototype .topbar .app-menu-button span {
        width: 18px;
        height: 13px;
      }

      .layout-prototype .topbar .app-menu-button span::before {
        width: 18px;
        box-shadow:
          0 5.5px 0 currentColor,
          0 11px 0 currentColor;
      }

      .layout-prototype .topbar-range {
        flex: 1 1 calc(100% - 44px);
      }

      .layout-prototype .topbar-spacer {
        display: none;
      }

      .layout-prototype .topbar-series {
        flex: 1 1 160px;
      }

      .layout-prototype .topbar-favorites {
        flex: 1 1 190px;
      }

      .layout-prototype .topbar-registration {
        flex: 0 0 auto;
      }

      .layout-prototype .topbar-search {
        flex: 1 1 100%;
        max-width: none;
      }

      .layout-prototype .topbar .segmented {
        width: 100%;
      }

      .layout-prototype .topbar .segmented button,
      .layout-prototype .topbar .topbar-toggle button,
      .layout-prototype .topbar .race-visibility-toggle button {
        flex: 1 1 auto;
        min-height: 34px;
        height: 34px;
        min-width: 0;
        padding: 0 10px;
        font-size: 12px;
      }

      .layout-prototype .topbar select,
      .layout-prototype .topbar input {
        min-height: 40px;
        height: 40px;
      }
    }

    /* v1.6.6 compact desktop topbar */
    .layout-prototype .topbar {
      --topbar-main-offset: 42px;
      gap: 8px;
      min-height: 38px;
      padding: 0 10px 0 0;
      background: #fff;
      color: var(--host-blue);
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 400 !important;
      font-synthesis: none;
    }

    .layout-prototype .topbar::before {
      inset: 0 0 0 var(--topbar-main-offset);
      background: #fff;
      box-shadow: 0 7px 18px rgba(31, 29, 26, 0.08);
    }

    .layout-prototype .topbar .app-menu-button {
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      background: #fff !important;
      color: var(--host-blue);
      font-weight: 400 !important;
      box-shadow: 0 6px 16px rgba(31, 29, 26, 0.08);
    }

    .layout-prototype .topbar .app-menu-button span {
      width: 16px;
      height: 12px;
    }

    .layout-prototype .topbar .app-menu-button span::before {
      width: 16px;
      height: 1.5px;
      box-shadow:
        0 5.25px 0 currentColor,
        0 10.5px 0 currentColor;
    }

    .layout-prototype .topbar-spacer {
      display: none;
    }

    .layout-prototype .topbar-series {
      flex: 0 1 168px;
    }

    .layout-prototype .topbar-search {
      flex: 0 1 clamp(220px, 22vw, 320px);
      max-width: 320px;
      margin-left: auto;
    }

    .layout-prototype .topbar .segmented {
      padding: 3px;
      background: #fff;
    }

    .layout-prototype .topbar .segmented button {
      min-width: auto;
      min-height: 28px;
      height: 28px;
      padding: 0 13px;
      color: var(--host-blue) !important;
      font-size: 13px;
      font-weight: 400 !important;
    }

    .layout-prototype .topbar .segmented button.active {
      background: var(--host-blue) !important;
      color: #fff !important;
      font-weight: 400 !important;
    }

    .layout-prototype .topbar select,
    .layout-prototype .topbar input {
      min-height: 30px;
      height: 30px;
      background-color: var(--bg);
      color: var(--host-blue);
      font-size: 13px;
      font-weight: 400 !important;
    }

    .layout-prototype .topbar select {
      padding: 5px 34px 5px 12px;
    }

    .layout-prototype .topbar input {
      padding: 5px 38px 5px 13px;
    }

    .layout-prototype .topbar-search::before {
      right: 15px;
      width: 13px;
      height: 13px;
      border-width: 1.75px;
      border-color: var(--host-blue);
    }

    .layout-prototype .topbar-search::after {
      right: 11px;
      top: calc(50% + 6px);
      width: 10px;
      height: 1.75px;
      background: var(--host-blue);
    }

    .layout-prototype .topbar .topbar-switch-wrap {
      display: inline-flex;
      align-items: center;
    }

    .layout-prototype .topbar .topbar-switch-wrap.race-visibility-toggle {
      padding: 0;
      background: transparent;
    }

    .layout-prototype .topbar .topbar-switch {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 30px;
      min-height: 30px;
      min-width: 116px;
      padding: 0 12px 0 8px;
      border: 0 !important;
      border-radius: 999px;
      background: var(--bg) !important;
      color: var(--host-blue) !important;
      font-family: inherit;
      font-size: 13px;
      font-weight: 400 !important;
      line-height: 1;
      white-space: nowrap;
      box-shadow: none;
      cursor: pointer;
    }

    .layout-prototype .topbar .race-visibility-toggle button.topbar-switch {
      height: 30px;
      min-height: 30px;
      min-width: 116px;
      padding: 0 12px 0 8px;
      font-size: 13px;
      font-weight: 400 !important;
    }

    .layout-prototype .topbar .race-visibility-toggle button.topbar-switch.active {
      font-weight: 400 !important;
    }

    .layout-prototype .topbar .favorite-switch .favorite-toggle-icon {
      width: 17px;
      height: 17px;
      margin: 0;
      background: rgba(255, 255, 255, 0.9);
      color: var(--favorite);
      font-size: 11px;
    }

    .layout-prototype .topbar .registration-switch .race-document-dot {
      width: 9px !important;
      height: 9px !important;
      border-radius: 999px;
      background: var(--status-open) !important;
    }

    .layout-prototype .topbar .topbar-switch.active {
      font-weight: 400 !important;
    }

    .layout-prototype .topbar .topbar-favorites button.favorite-switch.active {
      background: var(--favorite) !important;
      color: var(--host-blue) !important;
    }

    .layout-prototype .topbar .favorite-switch.active .favorite-toggle-icon {
      background: rgba(255, 255, 255, 0.42);
      color: var(--host-blue);
    }

    .layout-prototype .topbar .topbar-registration .registration-switch.active {
      background: var(--status-open) !important;
      color: var(--host-blue) !important;
    }

    .layout-prototype .topbar .topbar-registration .registration-switch.active .race-document-dot {
      background: var(--host-blue) !important;
    }

    .layout-prototype .topbar .topbar-registration.race-visibility-toggle .topbar-switch:not(.active) {
      background: var(--bg) !important;
      color: var(--host-blue) !important;
    }

    @media (min-width: 861px) and (max-width: 1100px) {
      .layout-prototype .topbar {
        gap: 6px;
        padding-right: 8px;
      }

      .layout-prototype .topbar-series {
        flex-basis: 136px;
      }

      .layout-prototype .topbar-search {
        flex-basis: 184px;
        max-width: 260px;
      }

      .layout-prototype .topbar .segmented button {
        padding: 0 9px;
      }
    }

    @media (max-width: 860px) {
      .layout-prototype .topbar {
        --topbar-main-offset: 0;
        gap: 6px;
        padding: 7px;
      }

      .layout-prototype .topbar .app-menu-button {
        flex-basis: 32px;
        width: 32px;
        height: 32px;
      }

      .layout-prototype .topbar-range {
        flex: 1 1 calc(100% - 40px);
      }

      .layout-prototype .topbar-series {
        flex: 1 1 150px;
      }

      .layout-prototype .topbar-favorites,
      .layout-prototype .topbar-registration {
        flex: 0 0 auto;
      }

      .layout-prototype .topbar-search {
        flex: 1 1 100%;
        max-width: none;
        margin-left: 0;
      }

      .layout-prototype .topbar .segmented button,
      .layout-prototype .topbar .topbar-switch {
        min-height: 30px;
        height: 30px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app layout-map layout-prototype" id="app">
    <section class="map-panel" aria-label="Karte">
      <div id="map"></div>
    </section>

    <section class="filters-panel topbar-panel" aria-label="Filter und Navigation">
      <header class="topbar" aria-label="Hauptnavigation und Filter">
        <button class="app-menu-button" id="appMenuButton" type="button" aria-label="Menü öffnen">
          <span aria-hidden="true"></span>
        </button>

        <div class="topbar-range filter-group filter-group-range">
          <span class="filter-label topbar-filter-label">Zeitraum</span>
          <div class="segmented" id="rangeFilter" aria-label="Zeitraum">
            <button class="active" type="button" data-range="2">2 Wochen</button>
            <button type="button" data-range="4">4 Wochen</button>
            <button type="button" data-range="all">Alle</button>
          </div>
        </div>

        <label class="topbar-series filter-field">
          <span class="filter-label topbar-filter-label">Serie</span>
          <select id="seriesFilter">
            <option value="all">Alle Serien</option>
          </select>
        </label>

        <div class="topbar-favorites topbar-switch-wrap" id="favoriteFilter" aria-label="Favoritenfilter">
          <button class="topbar-switch favorite-switch" type="button" data-favorite-toggle aria-pressed="false" aria-label="Favoritenfilter: Alle Rennen">
            <span class="switch-icon favorite-toggle-icon" aria-hidden="true">★</span>
            <span class="switch-label" data-toggle-label>Alle Rennen</span>
          </button>
        </div>

        <div class="topbar-registration topbar-switch-wrap race-visibility-toggle" id="registrationVisibilityFilter" aria-label="Nennstatus">
          <button class="topbar-switch registration-switch active" type="button" data-registration-toggle aria-pressed="true" aria-label="Nennstatus: Offen">
            <span class="race-document-dot switch-icon" aria-hidden="true"></span>
            <span class="switch-label" data-toggle-label>Offen</span>
          </button>
        </div>

        <label class="topbar-search filter-field filter-field-search">
          <span class="filter-label topbar-filter-label">Suche</span>
          <input id="searchInput" type="search" placeholder="Suche" />
        </label>

        <button class="filter-toggle-button" id="filterToggleButton" type="button" aria-expanded="false" aria-label="Suche und Serienfilter öffnen">
          <span class="filter-toggle-icon filter-toggle-icon-search" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="10.5" cy="10.5" r="5.5"></circle>
              <path d="M15 15 L20 20"></path>
            </svg>
          </span>
          <span class="filter-toggle-icon filter-toggle-icon-close" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M8 8 L16 16"></path>
              <path d="M16 8 L8 16"></path>
            </svg>
          </span>
        </button>
      </header>

      <div class="active-filter-chips topbar-chips" id="activeFilterChips" aria-live="polite"></div>
    </section>

    <aside class="race-panel" aria-label="Rennen">
      <header class="panel-header">
        <div>
          <h1>Kommende Rennen</h1>
        </div>
      </header>

      <div class="results-toolbar">
        <div class="result-line" id="resultLine">Lade Rennen …</div>
      </div>
      <section class="race-grid" id="raceList" aria-live="polite"></section>
    </aside>
  </main>


<div class="map-footer">
  <span>RC Race Map Beta</span>
  <span>·</span>
  <a href="mailto:info@rcracemap.com">Feedback</a>
  <span>·</span>

  <span>·</span>

  <span>·</span>

</div>


  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.1.3/leaflet-maplibre-gl.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
