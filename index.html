<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RC-Rennen Deutschland</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>RC-Rennen Deutschland</h1>
    <p>Testversion: Strecken in venues.json, Rennen in races.json</p>
  </header>

  <section class="controls">
    <label>
      Filter
      <select id="filterMode">
        <option value="all">Alle</option>
        <option value="month">Monat</option>
        <option value="week">Kalenderwoche</option>
      </select>
    </label>

    <label id="monthControl" class="is-hidden">
      Monat
      <input id="monthInput" type="month" value="2026-04" />
    </label>

    <label id="weekControl" class="is-hidden">
      Woche
      <input id="weekInput" type="week" value="2026-W17" />
    </label>

    <button id="applyButton">Anzeigen</button>
  </section>

  <main class="layout">
    <div id="map"></div>

    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Rennen</h2>
        <p id="summary">Lade Daten...</p>
      </div>
      <div id="raceList" class="race-list"></div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
