<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RC Race Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app layout-map" id="app">
    <section class="map-panel" aria-label="Karte">
      <div id="map"></div>
    </section>

    <aside class="race-panel" aria-label="Rennen">
      <header class="panel-header">
        <div>
          <h1>Kommende Rennen</h1>
          <p class="intro">Rennen in der Region, sortiert nach Datum.</p>
        </div>

        <div class="view-toggle" aria-label="Ansicht">
          <button class="toggle-button active" id="mapWideButton" type="button">Karte groß</button>
          <button class="toggle-button" id="listWideButton" type="button">Liste groß</button>
        </div>
      </header>

      <section class="filters" aria-label="Filter">
        <div class="filter-group">
          <span class="filter-label">Zeitraum</span>
          <div class="segmented" id="rangeFilter">
            <button class="active" type="button" data-range="4">4 Wochen</button>
            <button type="button" data-range="8">8 Wochen</button>
            <button type="button" data-range="season">Saison</button>
          </div>
        </div>

        <label class="filter-field">
          <span class="filter-label">Serie</span>
          <select id="seriesFilter">
            <option value="all">Alle Serien</option>
          </select>
        </label>

        <label class="filter-field">
          <span class="filter-label">Suche</span>
          <input id="searchInput" type="search" placeholder="BTM, Tamiya, Bernau …" />
        </label>
      </section>

      <div class="result-line" id="resultLine">Lade Rennen …</div>
      <section class="race-grid" id="raceList" aria-live="polite"></section>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
