      color: var(--host-blue);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.08;
    }

    .layout-prototype .race-registration-count {
      margin-top: 1px;
      color: var(--host-blue);
      font-size: 17px;
      font-weight: 400;
      gap: 4px;
    }

    .layout-prototype .race-registration-count svg {
      width: 18px;
      height: 18px;
      stroke-width: 1.8;
    }

    .layout-prototype .race-card-header .race-series-tags {
      display: none;
    }

    .layout-prototype .race-venue {
      display: flex;
      align-items: center;
      gap: 5px;
      margin: 0;
      padding: 0 18px 5px;
      background: var(--card);
      color: var(--host-blue);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.25;
    }

    .layout-prototype .race-venue-pin {
      display: block;
      flex: 0 0 10px;
      width: 10px;
      height: 12px;
      color: currentColor;
      transform: translateY(-1px);
    }

    .layout-prototype .race-venue .venue-link,
    .layout-prototype .race-venue .venue-name-text {
      color: inherit;
      font-weight: 700;
      text-decoration: none;
    }

    .layout-prototype .race-venue-unknown {
      color: rgba(31, 29, 26, 0.45) !important;
    }

    .layout-prototype .race-document-links {
      display: flex;
      flex-wrap: wrap !important;
      align-items: center;
      column-gap: 12px !important;
      row-gap: 6px;
      margin: 0;
      padding: 6px 18px 10px;
      background: var(--card);
    }

    .layout-prototype .race-document-links .race-link-item {
      color: var(--host-blue);
      font-size: 11px !important;
      font-weight: 700 !important;
      line-height: 1.2;
      text-decoration: none;
    }

    .layout-prototype .race-document-links .race-link-item-status {
      text-decoration: none;
    }

    .layout-prototype .race-document-links .race-link-item-status-open,
    .layout-prototype .race-document-links .race-link-item-status {
      gap: 5px;
    }

    .layout-prototype .race-document-dot {
      width: 9px !important;
      height: 9px !important;
    }

    .layout-prototype .race-document-dot-open {
      background: var(--status-open) !important;
    }

    .layout-prototype .race-document-dot-closed {
      background: #9a9795 !important;
    }

    :root.theme-dark .layout-prototype .race-document-dot-closed {
      background: #3d5380 !important;
    }

    @media (prefers-color-scheme: dark) {
      :root:not(.theme-light) .layout-prototype .race-document-dot-closed {
        background: #3d5380 !important;
      }
    }

    .layout-prototype .race-document-dot-upcoming {
      background: var(--status-upcoming) !important;
    }

    .layout-prototype .race-document-links .race-link-item-status-closed {
      color: var(--status-closed);
      font-weight: 800 !important;
    }

    .layout-prototype .race-document-links .race-link-item-status-upcoming {
      color: var(--status-upcoming);
      font-weight: 800 !important;
    }

    .layout-prototype .race-card > .race-class-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      padding: 0 18px 16px;
      border-top: 0;
      border-radius: 0 0 22px 22px;
      background: var(--card);
    }

    .layout-prototype .race-card > .race-class-tags .tag-class {
      height: 19px;
      padding: 0 10px;
      border: 0;
      border-radius: 999px;
      background: var(--surface-neutral);
      color: var(--host-blue);
      font-size: 10px;
      font-weight: 400;
      line-height: 1;
    }

    .layout-prototype .race-card a.venue-link,
    .layout-prototype .race-card a.race-link-item:not(.race-link-item-status),
    .layout-prototype .race-card a.race-link-item-status .race-link-text,
    .layout-prototype .race-card .race-registration-count-link .registration-count-value {
      text-decoration: none !important;
      background-image: linear-gradient(currentColor, currentColor);
      background-position: 0 100%;
      background-repeat: no-repeat;
      background-size: 0 1px;
      transition:
        color 140ms ease,
        background-size 140ms ease;
    }

    .layout-prototype .race-card a.venue-link:hover,
    .layout-prototype .race-card a.venue-link:focus-visible,
    .layout-prototype .race-card a.race-link-item:not(.race-link-item-status):hover,
    .layout-prototype .race-card a.race-link-item:not(.race-link-item-status):focus-visible,
    .layout-prototype .race-card a.race-link-item-status:hover .race-link-text,
    .layout-prototype .race-card a.race-link-item-status:focus-visible .race-link-text,
    .layout-prototype .race-card .race-registration-count-link:hover .registration-count-value,
    .layout-prototype .race-card .race-registration-count-link:focus-visible .registration-count-value {
      text-decoration: none !important;
      background-size: 100% 1px;
    }

    .layout-prototype .race-card a.race-link-item-status:hover,
    .layout-prototype .race-card a.race-link-item-status:focus-visible {
      text-decoration: none !important;
    }

    .layout-prototype .race-card a.venue-link:focus-visible,
    .layout-prototype .race-card a.race-link-item:focus-visible,
    .layout-prototype .race-card .race-registration-count-link:focus-visible {
      outline: none;
    }

    .layout-prototype .race-card > .race-class-tags .tag-class-toggle {
      background: var(--surface-neutral);
      color: var(--host-blue);
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
    }

    .layout-prototype .race-card > .race-class-tags .tag-class-toggle:hover,
    .layout-prototype .race-card > .race-class-tags .tag-class-toggle:focus-visible {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .layout-prototype .race-card.registration-closed {
      background: var(--card-closed);
      box-shadow: 0 12px 28px rgba(var(--shadow-rgb, 31, 29, 26), 0.08);
    }

    .layout-prototype .race-card > .registration-status {
      padding: 0 18px 14px;
      background: var(--card);
    }

    .layout-prototype .race-card.registration-closed > .registration-status {
      background: var(--card-closed);
    }

    .layout-prototype .race-card.registration-closed .race-card-header,
    .layout-prototype .race-card.registration-closed .race-venue,
    .layout-prototype .race-card.registration-closed .race-document-links,
    .layout-prototype .race-card.registration-closed > .race-class-tags {
      background: var(--card-closed);
    }

    .layout-prototype .race-card.registration-closed .race-date,
    .layout-prototype .race-card.registration-closed .race-name,
    .layout-prototype .race-card.registration-closed .race-registration-count,
    .layout-prototype .race-card.registration-closed .race-venue {
      color: var(--host-blue);
    }

    .layout-prototype .race-card.registration-closed .race-document-links .race-link-item,
    .layout-prototype .race-card.registration-closed .race-venue .venue-link,
    .layout-prototype .race-card.registration-closed .race-venue .venue-name-text {
      color: var(--host-blue);
    }

    .layout-prototype .race-card.registration-closed > .race-class-tags .tag-class {
      background: var(--host-blue);
      color: var(--card-closed);
    }

    .layout-prototype .race-card.is-clickable:hover,
    .layout-prototype .race-card.is-clickable:focus-visible,
    .layout-prototype .race-card.active,
    .layout-prototype .race-card.is-clickable.active,
    .layout-prototype .race-card.is-clickable.active:hover {
      border-color: transparent !important;
      box-shadow: 0 16px 34px rgba(31, 29, 26, 0.14);
    }

    .layout-prototype.is-venue-mode .race-card,
    .layout-prototype.is-venue-mode .race-card.is-clickable {
      cursor: default;
    }

    @media (max-width: 860px) {
      .layout-prototype .race-grid {
        gap: 12px;
      }

      .layout-prototype .race-panel {
        padding: 0 8px 0 0;
      }

      .layout-prototype .race-card {
        border-radius: 20px;
      }

      .layout-prototype .race-host {
        min-height: 42px;
        padding: 9px 14px;
        border-radius: 20px 20px 0 0;
      }

      .layout-prototype .race-host .venue-link,
      .layout-prototype .race-host .host-name {
        font-size: 14px;
      }

      .layout-prototype .race-card-header {
        padding: 13px 14px 5px;
      }

      .layout-prototype .race-date {
        font-size: 13px;
      }

      .layout-prototype .race-name {
        font-size: 16px;
      }

      .layout-prototype .race-registration-count {
        font-size: 16px;
      }

      .layout-prototype .race-venue,
      .layout-prototype .race-document-links,
      .layout-prototype .race-card > .race-class-tags {
        padding-left: 14px;
        padding-right: 14px;
      }

      .layout-prototype .race-card > .race-class-tags {
        padding-bottom: 14px;
        border-radius: 0 0 20px 20px;
      }
    }

    /* topbar-chips-row: locate button + chips + result line on same row */
    .layout-prototype .topbar-chips-row {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 40px;
    }

    .layout-prototype .locate-desktop-slot {
      flex: 0 0 40px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .layout-prototype .topbar-chips-row .topbar-chips {
      flex: 1 1 auto;
      margin: 0;
      padding: 0;
    }

    .layout-prototype .topbar-chips-row .topbar-chips.is-empty {
      display: flex;
    }

    @media (max-width: 860px) {
      .layout-prototype .locate-desktop-slot { display: none; }
      .layout-prototype .topbar-chips-row { min-height: 0; gap: 8px; }
    }

    .layout-prototype .topbar-result-line {
      flex: 0 0 auto;
      margin-left: auto;
      padding-left: 12px;
      color: var(--muted-light);
      font-size: 11px;
      font-weight: 400;
      line-height: 1.25;
      white-space: nowrap;
    }

    /* select custom arrow */
    .layout-prototype .topbar select {
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23213769' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 13px center;
    }

    /* class chips = #ebebeb */
    .layout-prototype .race-card > .race-class-tags .tag-class {
      background: var(--pill-bg);
      color: var(--host-blue);
    }

    /* ── Mobile drawer — higher specificity beats desktop topbar rules ──────
       .mob-drawer adds a third class, pushing specificity from 0,2,x to 0,3,x
       so these rules win over all .layout-prototype .topbar overrides above.  */
    .mob-drawer .mob-drawer-filters .topbar {
      flex-wrap: wrap;
      align-items: flex-start;
      padding: 10px 14px 12px;
      gap: 8px;
      row-gap: 8px;
      min-height: 0;
    }
    .mob-drawer .mob-drawer-filters .mob-filter-btn { order: -2 !important; }
    .mob-drawer .mob-drawer-filters .topbar-search {
      order: -1 !important;
      flex: 1 1 180px;
      min-width: 0;
      max-width: none;
    }
    /* Uniform 38px touch height for all drawer filter elements. */
    .mob-drawer .mob-drawer-filters .topbar input,
    .mob-drawer .mob-drawer-filters .topbar select {
      height: 38px !important;
      min-height: 38px !important;
    }
    /* font-size:16px — iOS Safari auto-zooms on focus when < 16px */
    .mob-drawer .mob-drawer-filters .topbar input { font-size: 16px !important; }
    .mob-drawer .mob-drawer-filters .topbar select { font-size: 16px !important; }
    .mob-drawer .mob-drawer-filters .topbar .segmented button,
    .mob-drawer .mob-drawer-filters .topbar .topbar-filter-group button {
      height: 38px !important;
      min-height: 38px !important;
      padding: 0 16px !important;
    }

  </style>
</head>
<body>
  <main class="app layout-map layout-prototype" id="app">
    <section class="map-panel" aria-label="Karte">
      <div id="map"></div>
      <div class="map-loader" aria-hidden="true"></div>
    </section>

    <section class="filters-panel topbar-panel" aria-label="Filter und Navigation">
      <header class="topbar" aria-label="Hauptnavigation und Filter">
        <button class="app-menu-button" id="appMenuButton" type="button" aria-label="Menü öffnen">
          <svg aria-hidden="true" width="18" height="12" viewBox="0 0 18 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="0" y1="1" x2="18" y2="1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="0" y1="6" x2="18" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="0" y1="11" x2="18" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>

        <div class="topbar-range filter-group filter-group-range">
            <span class="filter-label topbar-filter-label">Zeitraum</span>
            <div class="segmented" id="rangeFilter" aria-label="Zeitraum">
              <button class="active" type="button" data-range="2">2 Wochen</button>
              <button type="button" data-range="4">4 Wochen</button>
              <button type="button" data-range="all">Alle</button>
            </div>
          </div>

          <label class="topbar-series filter-field">
            <span class="filter-label topbar-filter-label">Serie</span>
            <select id="seriesFilter">
              <option value="all">Alle Serien</option>
            </select>
          </label>

          <div class="topbar-favorites topbar-filter-group" id="favoriteFilter" aria-label="Favoritenfilter">
            <button class="active" type="button" data-favorite-filter="all" aria-pressed="true">Alle</button>
            <button type="button" data-favorite-filter="favorites" aria-pressed="false">
              <svg class="favorite-toggle-icon" viewBox="1 1 22 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill-rule="evenodd" d="M23,12 A11,11 0 1,1 1,12 A11,11 0 1,1 23,12 Z M12,5.6 L13.98,9.6 L18.4,10.25 L15.2,13.37 L15.96,17.77 L12,15.69 L8.04,17.77 L8.8,13.37 L5.6,10.25 L10.02,9.6 Z" fill="currentColor"/></svg>
              <span class="label-full">Favoriten</span>
            </button>
          </div>

          <div class="topbar-registration topbar-filter-group race-visibility-toggle" id="registrationVisibilityFilter" aria-label="Nennstatus">
            <button class="active" type="button" data-registration-visibility="all" aria-pressed="true">Alle</button>
            <button type="button" data-registration-visibility="open" aria-pressed="false">
              <span class="race-document-dot" aria-hidden="true"></span>
              <span class="label-full">Offen</span>
            </button>
          </div>

        <button class="mob-filter-btn" id="mobFilterBtn" type="button" aria-expanded="false" aria-label="Filter ein-/ausblenden">
          <svg aria-hidden="true" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="2" y1="5" x2="18" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="15" x2="18" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="7" cy="5" r="2.5" fill="currentColor"/>
            <circle cx="13" cy="10" r="2.5" fill="currentColor"/>
            <circle cx="7" cy="15" r="2.5" fill="currentColor"/>
          </svg>
          <span class="mob-filter-dot" aria-hidden="true"></span>
        </button>

        <label class="topbar-search filter-field filter-field-search">
          <span class="filter-label topbar-filter-label">Suche</span>
          <input id="searchInput" type="search" placeholder="Suche" />
        </label>

        <button class="filter-toggle-button" id="filterToggleButton" type="button" aria-expanded="false" aria-label="Suche und Serienfilter öffnen">
          <span class="filter-toggle-icon filter-toggle-icon-search" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="10.5" cy="10.5" r="5.5"></circle>
              <path d="M15 15 L20 20"></path>
            </svg>
          </span>
          <span class="filter-toggle-icon filter-toggle-icon-close" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M8 8 L16 16"></path>
              <path d="M16 8 L8 16"></path>
            </svg>
          </span>
        </button>
      </header>

      <div class="topbar-chips-row">
        <div id="locateDesktopSlot" class="locate-desktop-slot"></div>
        <div class="active-filter-chips topbar-chips" id="activeFilterChips" aria-live="polite"></div>
        <div class="result-line topbar-result-line" id="resultLine">Lade Rennen …</div>
      </div>
    </section>

    <aside class="race-panel" aria-label="Rennen">
      <section class="race-grid" id="raceList" aria-live="polite"></section>
    </aside>
  </main>

  <!-- Mobile floating elements -->
  <button class="mob-menu-btn" id="mobMenuBtn" type="button" aria-label="Menü öffnen">
    <svg aria-hidden="true" width="18" height="12" viewBox="0 0 18 12" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="1" x2="18" y2="1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="6" x2="18" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="11" x2="18" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="mob-result-badge" id="mobResultBadge" aria-live="polite"></div>

  <!-- Mobile Bottom Drawer (layout-prototype needed for card CSS) -->
  <div class="mob-drawer mob-drawer--half layout-prototype" id="mobDrawer" aria-label="Filter und Rennen">
    <div class="mob-drawer-handle" id="mobDrawerHandle" role="button" aria-label="Schublade öffnen oder schließen" tabindex="0">
      <div class="mob-drawer-handle-bar"></div>
    </div>

    <div class="mob-drawer-filters" id="mobFilterMount">
      <!-- header.topbar is moved here by JS on mobile (Versuch 3) -->
    </div>

    <div class="mob-drawer-list" id="mobRaceList" aria-live="polite"></div>


    <div class="mob-drawer-footer"></div>
  </div>


  <!-- App Menu Panel -->
  <div id="appMenuPanel" class="app-menu-panel" aria-hidden="true">
    <div class="app-menu-header">
      <svg class="app-menu-logo-pin" viewBox="0 0 477 528.98" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g fill="#C8B090">
          <path d="M249.52,205.37v66.26c22.09-2.98,44.17-5.96,66.26-6.71v-66.26c-22.09.75-44.17,3.73-66.26,6.71Z"/>
          <path d="M477,238.5C477,106.78,370.22,0,238.5,0S0,106.78,0,238.5c0,111.19,76.09,204.61,179.04,231.03l59.46,59.46,59.46-59.46c102.95-26.42,179.04-119.84,179.04-231.03ZM382.05,271.63c-22.09-5.96-44.17-7.45-66.26-6.71v66.26c-22.09.75-44.17,3.73-66.26,6.71v-66.26c-22.09,2.98-44.17,5.96-66.26,6.71v66.26c-22.09.75-44.17-.75-66.26-6.71v-66.26c22.09,5.96,44.17,7.45,66.26,6.71v-66.26c-22.09.75-44.17-.75-66.26-6.71v-66.26c22.09,5.96,44.17,7.45,66.26,6.71v66.26c22.09-.75,44.17-3.73,66.26-6.71v-66.26c22.09-2.98,44.17-5.96,66.26-6.71v66.26c22.09-.75,44.17.75,66.26,6.71v66.26Z"/>
        </g>
      </svg>
      <span class="app-menu-logo">RC RaceMap</span>
    </div>
    <div id="appMenuContent" class="app-menu-content"></div>
  </div>
  <div id="appMenuOverlay" class="app-menu-overlay"></div>
  <button class="app-menu-close" id="appMenuClose" type="button" aria-label="Menü schließen">
    <svg aria-hidden="true" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.1.3/leaflet-maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js?v=149" type="module"></script>
  <div id="favoritesPage" class="admin-page" hidden>
    <button type="button" class="sub-page-close" id="favoritesPageBack" aria-label="Schließen">
      <svg aria-hidden="true" width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
